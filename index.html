    <style>
      /* Pallino cookie più piccolo */
      .silktide-consent-manager__cookie-icon {
        width: 36px !important;
        height: 36px !important;
        min-width: 36px !important;
        min-height: 36px !important;
      }
      .silktide-consent-manager__cookie-icon svg {
        width: 20px !important;
        height: 20px !important;
      }

      /* Banner compatto su mobile */
      @media (max-width: 768px) {
        .silktide-consent-manager__banner {
          padding: 14px 16px !important;
          max-width: 100vw !important;
          box-sizing: border-box !important;
        }
        .silktide-consent-manager__banner-title {
          font-size: 13px !important;
          margin-bottom: 4px !important;
          letter-spacing: 1px !important;
        }
        .silktide-consent-manager__banner-description {
          font-size: 12px !important;
          margin-bottom: 10px !important;
          line-height: 1.5 !important;
        }
        .silktide-consent-manager__banner-description p {
          margin: 0 !important;
        }
        .silktide-consent-manager__banner-buttons {
          display: flex !important;
          flex-direction: row !important;
          flex-wrap: nowrap !important;
          gap: 8px !important;
          width: 100% !important;
        }
        .silktide-consent-manager__banner-buttons button {
          padding: 10px 0 !important;
          font-size: 10px !important;
          flex: 1 !important;
          min-width: 0 !important;
          letter-spacing: 0.5px !important;
        }
        .silktide-consent-manager__banner-preferences-link,
        .silktide-consent-manager__banner-buttons a {
          font-size: 10px !important;
          margin-top: 6px !important;
        }
        /* Modale preferenze compatta su mobile */
        .silktide-consent-manager__preferences {
          width: 92vw !important;
          max-width: 92vw !important;
          max-height: 75vh !important;
          padding: 16px !important;
          font-size: 13px !important;
          overflow-y: auto !important;
        }
        .silktide-consent-manager__preferences-title {
          font-size: 15px !important;
          letter-spacing: 1px !important;
        }
        .silktide-consent-manager__preferences-description {
          font-size: 12px !important;
        }
      }
    </style>
    <script src="/silktide-consent-manager.js"></script>
    <script>
    silktideCookieBannerManager.updateCookieBannerConfig({
      background: {
        showBackground: false
      },
      cookieIcon: {
        position: "bottomLeft"
      },
      cookieTypes: [
        {
          id: "necessary",
          name: "Necessari",
          description: "<p>Cookie indispensabili per il funzionamento del sito. Non possono essere disattivati.</p>",
          required: true,
          onAccept: function() {}
        },
        {
          id: "analytics",
          name: "Analitici",
          description: "<p>Ci aiutano a capire come viene utilizzato il sito per poterlo migliorare.</p>",
          defaultValue: true,
          onAccept: function() {
            if (typeof gtag !== 'undefined') {
              gtag('consent', 'update', { analytics_storage: 'granted' });
            }
          },
          onReject: function() {
            if (typeof gtag !== 'undefined') {
              gtag('consent', 'update', { analytics_storage: 'denied' });
            }
          }
        },
        {
          id: "advertising",
          name: "Pubblicitari",
          description: "<p>Utilizzati per mostrarti contenuti e annunci pertinenti ai tuoi interessi.</p>",
          onAccept: function() {
            if (typeof gtag !== 'undefined') {
              gtag('consent', 'update', {
                ad_storage: 'granted',
                ad_user_data: 'granted',
                ad_personalization: 'granted'
              });
            }
          },
          onReject: function() {
            if (typeof gtag !== 'undefined') {
              gtag('consent', 'update', {
                ad_storage: 'denied',
                ad_user_data: 'denied',
                ad_personalization: 'denied'
              });
            }
          }
        }
      ],
      text: {
        banner: {
          description: "<p>Utilizziamo i cookie per migliorare la tua esperienza sul sito. <a href='https://intiniwebatelier.com/cookie-policy' target='_blank'>Cookie Policy</a></p>",
          acceptAllButtonText: "Accetta tutti",
          acceptAllButtonAccessibleLabel: "Accetta tutti i cookie",
          rejectNonEssentialButtonText: "Rifiuta",
          rejectNonEssentialButtonAccessibleLabel: "Rifiuta i cookie non essenziali",
          preferencesButtonText: "Preferenze",
          preferencesButtonAccessibleLabel: "Apri preferenze cookie"
        },
        preferences: {
          title: "Preferenze cookie",
          description: "<p>Puoi scegliere quali tipi di cookie consentire. Le tue preferenze si applicheranno a tutto il sito.</p>",
          creditLinkText: "",
          creditLinkAccessibleLabel: ""
        }
      },
      position: {
        banner: "bottomCenter"
      }
    });
    </script>
