    <link rel="stylesheet" href="/silktide-consent-manager.css">
    <style>
      /* NASCONDE COMPLETAMENTE scritta e icona Silktide "get for free" */
      .silktide-consent-manager__banner-credit,
      .silktide-consent-manager__preferences-credit,
      .silktide-consent-manager__preferences-credit-link,
      [class*="silktide-consent-manager__credit"],
      [class*="silktide-consent-manager"][class*="credit"] {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        overflow: hidden !important;
      }

      /* PALLINO COOKIE: da enorme a 34px */
      .silktide-consent-manager__cookie-icon {
        width: 28px !important;
        height: 28px !important;
        min-width: 28px !important;
        min-height: 28px !important;
        max-width: 28px !important;
        max-height: 28px !important;
        padding: 0 !important;
      }
      .silktide-consent-manager__cookie-icon svg {
        width: 14px !important;
        height: 14px !important;
      }

      /* MOBILE: banner compatto */
      @media (max-width: 768px) {
        .silktide-consent-manager__banner {
          padding: 10px 12px !important;
          max-width: 100vw !important;
          box-sizing: border-box !important;
        }
        .silktide-consent-manager__banner * {
          box-sizing: border-box !important;
        }
        .silktide-consent-manager__banner-title {
          font-size: 12px !important;
          margin: 0 0 2px 0 !important;
        }
        .silktide-consent-manager__banner-description,
        .silktide-consent-manager__banner-description p,
        .silktide-consent-manager__banner-description span {
          font-size: 11px !important;
          line-height: 1.3 !important;
          margin: 0 0 6px 0 !important;
          padding: 0 !important;
        }
        .silktide-consent-manager__banner-buttons {
          display: flex !important;
          flex-direction: row !important;
          flex-wrap: nowrap !important;
          gap: 6px !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        .silktide-consent-manager__banner-buttons button,
        .silktide-consent-manager__banner-buttons a.silktide-consent-manager__button {
          padding: 7px 8px !important;
          font-size: 10px !important;
          flex: 1 !important;
          min-width: 0 !important;
          max-width: 50% !important;
          white-space: nowrap !important;
          margin: 0 !important;
        }
        .silktide-consent-manager__banner-preferences-link,
        .silktide-consent-manager__banner a:not(.silktide-consent-manager__button) {
          font-size: 9px !important;
          margin-top: 4px !important;
          padding: 0 !important;
        }
        .silktide-consent-manager__preferences {
          width: 92vw !important;
          max-width: 92vw !important;
          max-height: 70vh !important;
          padding: 12px !important;
          overflow-y: auto !important;
        }
        .silktide-consent-manager__preferences-title {
          font-size: 14px !important;
        }
        .silktide-consent-manager__preferences-description,
        .silktide-consent-manager__preferences-description p {
          font-size: 11px !important;
        }
        .silktide-consent-manager__preferences-cookie-type-name {
          font-size: 12px !important;
        }
        .silktide-consent-manager__preferences-cookie-type-description,
        .silktide-consent-manager__preferences-cookie-type-description p {
          font-size: 10px !important;
        }
        .silktide-consent-manager__preferences-buttons button {
          padding: 7px 10px !important;
          font-size: 10px !important;
        }
      }
    </style>
    <script src="/silktide-consent-manager.js"></script>
    <script>
    silktideCookieBannerManager.updateCookieBannerConfig({
      background: {
        showBackground: false
      },
      cookieIcon: {
        position: "bottomLeft"
      },
      cookieTypes: [
        {
          id: "necessary",
          name: "Necessari",
          description: "<p>Cookie indispensabili per il funzionamento del sito. Non possono essere disattivati.</p>",
          required: true,
          onAccept: function() {}
        },
        {
          id: "analytics",
          name: "Analitici",
          description: "<p>Ci aiutano a capire come viene utilizzato il sito per poterlo migliorare.</p>",
          defaultValue: true,
          onAccept: function() {
            if (typeof gtag !== 'undefined') {
              gtag('consent', 'update', { analytics_storage: 'granted' });
            }
          },
          onReject: function() {
            if (typeof gtag !== 'undefined') {
              gtag('consent', 'update', { analytics_storage: 'denied' });
            }
          }
        },
        {
          id: "advertising",
          name: "Pubblicitari",
          description: "<p>Utilizzati per mostrarti contenuti e annunci pertinenti ai tuoi interessi.</p>",
          onAccept: function() {
            if (typeof gtag !== 'undefined') {
              gtag('consent', 'update', {
                ad_storage: 'granted',
                ad_user_data: 'granted',
                ad_personalization: 'granted'
              });
            }
          },
          onReject: function() {
            if (typeof gtag !== 'undefined') {
              gtag('consent', 'update', {
                ad_storage: 'denied',
                ad_user_data: 'denied',
                ad_personalization: 'denied'
              });
            }
          }
        }
      ],
      text: {
        banner: {
          description: "<p>Utilizziamo i cookie per migliorare la tua esperienza sul sito. <a href='https://intiniwebatelier.com/cookie-policy' target='_blank'>Cookie Policy</a></p>",
          acceptAllButtonText: "Accetta tutti",
          acceptAllButtonAccessibleLabel: "Accetta tutti i cookie",
          rejectNonEssentialButtonText: "Rifiuta",
          rejectNonEssentialButtonAccessibleLabel: "Rifiuta i cookie non essenziali",
          preferencesButtonText: "Preferenze",
          preferencesButtonAccessibleLabel: "Apri preferenze cookie"
        },
        preferences: {
          title: "Preferenze cookie",
          description: "<p>Puoi scegliere quali tipi di cookie consentire. Le tue preferenze si applicheranno a tutto il sito.</p>",
          creditLinkText: "",
          creditLinkAccessibleLabel: ""
        }
      },
      position: {
        banner: "bottomCenter"
      }
    });
    </script>
